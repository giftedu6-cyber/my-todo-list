<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Focus List</title><style>
:root{--bg:#f6f7fb;--surface:#fff;--surface2:#f8fafc;--ink:#152033;--muted:#6b7280;--line:#e7eaf0;--brand:#635bff;--brand2:#eeedff;--danger:#d9485f;--shadow:0 18px 50px rgba(32,38,64,.08)}[data-theme="dark"]{--bg:#10131a;--surface:#191e29;--surface2:#222937;--ink:#eef2ff;--muted:#aab3c5;--line:#30394a;--brand:#978fff;--brand2:#2c2b50;--danger:#ff8594;--shadow:0 18px 50px rgba(0,0,0,.28)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}.app{max-width:960px;margin:auto;padding:38px 20px 72px}.top{display:flex;justify-content:space-between;gap:18px;align-items:center}.eyebrow{color:var(--brand);font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{font-size:2.2rem;letter-spacing:-.045em;margin:4px 0 6px}p{margin:0}.subtitle{color:var(--muted)}button,input,select{font:inherit}.theme{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--line);background:var(--surface);border-radius:12px;color:var(--ink);cursor:pointer}.layout{display:grid;grid-template-columns:270px 1fr;gap:20px;margin-top:28px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.side{padding:20px}.side h2{font-size:.95rem;margin:0 0 13px}.overview{display:grid;gap:12px}.metric{padding:14px;background:var(--surface2);border-radius:12px}.metric b{display:block;font-size:1.55rem;letter-spacing:-.04em}.metric span{color:var(--muted);font-size:.84rem}.ring{margin:20px auto 8px;width:124px;height:124px;border-radius:50%;background:conic-gradient(var(--brand) var(--progress),var(--line) 0);display:grid;place-items:center}.ring:before{content:"";width:98px;height:98px;border-radius:50%;background:var(--surface);grid-area:1/1}.ring b{grid-area:1/1;z-index:1;font-size:1.3rem}.main{padding:20px}.add{display:grid;grid-template-columns:1fr 120px 145px auto;gap:9px}.control{height:44px;padding:0 12px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);border-radius:10px}.control:focus{outline:3px solid var(--brand2);border-color:var(--brand)}.add button{height:44px;border:0;border-radius:10px;padding:0 16px;background:var(--brand);color:white;font-weight:700;cursor:pointer}.toolbar{display:flex;justify-content:space-between;align-items:center;margin:24px 0 9px;gap:10px}.filters{display:flex;gap:5px}.filters button,.clear{border:0;background:transparent;color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer}.filters button.active{background:var(--brand2);color:var(--brand);font-weight:700}.clear{color:var(--danger)}.task{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:12px;padding:15px 4px;border-top:1px solid var(--line)}.check{width:19px;height:19px;accent-color:var(--brand)}.task-title{font-weight:650;letter-spacing:-.01em}.task.done .task-title{text-decoration:line-through;color:var(--muted);font-weight:400}.meta{display:flex;align-items:center;gap:8px;margin-top:5px;color:var(--muted);font-size:.82rem}.badge{padding:3px 7px;border-radius:99px;background:var(--surface2)}.badge.high{background:#fff0f1;color:#c03048}[data-theme="dark"] .badge.high{background:#4d2630;color:#ffabb6}.actions{display:flex;gap:4px}.icon{border:0;background:transparent;color:var(--muted);cursor:pointer;padding:7px;border-radius:8px}.icon:hover{background:var(--surface2);color:var(--ink)}.empty{padding:46px 5px;text-align:center;color:var(--muted)}dialog{border:0;border-radius:16px;background:var(--surface);color:var(--ink);box-shadow:var(--shadow);padding:22px;width:min(440px,calc(100% - 24px)}dialog::backdrop{background:#11182788}.edit-grid{display:grid;gap:12px}.edit-grid label{display:grid;gap:6px;color:var(--muted);font-size:.86rem}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.dialog-actions button{padding:9px 13px;border:1px solid var(--line);background:var(--surface);border-radius:9px;color:var(--ink);cursor:pointer}.dialog-actions .save{background:var(--brand);border-color:var(--brand);color:white}@media(max-width:760px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.side h2{grid-column:1/-1;margin:0}.ring{display:none}.overview{display:contents}.metric{padding:11px}.add{grid-template-columns:1fr 1fr}.add input{grid-column:1/-1}.add button{grid-column:1/-1}}@media(max-width:430px){.app{padding:25px 14px}.top{align-items:flex-start}h1{font-size:1.75rem}.main,.side{padding:14px}.task{grid-template-columns:22px 1fr}.actions{grid-column:2;justify-content:flex-end}.toolbar{align-items:flex-start;flex-direction:column}.side{grid-template-columns:1fr 1fr}.metric:last-child{grid-column:1/-1}}
</style></head><body><main class="app"><header class="top"><div><div class="eyebrow">Personal workspace</div><h1>Focus List</h1><p class="subtitle" id="today"></p></div><button class="theme" id="theme" type="button"><span id="themeIcon">&#9788;</span><span id="themeText">&#45796;&#53356; &#47784;&#46300;</span></button></header><div class="layout"><aside class="panel side"><h2>&#50724;&#45720;&#51032; &#54788;&#54889;</h2><div class="overview"><div class="metric"><b id="remaining">0</b><span>&#45224;&#51008; &#51068;</span></div><div class="metric"><b id="done">0</b><span>&#50756;&#47308;&#54620; &#51068;</span></div><div class="metric"><b id="total">0</b><span>&#51204;&#52404; &#54637;&#47785;</span></div></div><div class="ring" id="ring"><b id="ratio">0%</b></div></aside><section class="panel main"><form class="add" id="form"><input class="control" id="title" required maxlength="100" placeholder="&#49352; &#54624; &#51068;&#51012; &#51077;&#47141;&#54616;&#49464;&#50836;"><select class="control" id="priority"><option>&#48372;&#53685;</option><option>&#45458;&#51020;</option><option>&#45230;&#51020;</option></select><input class="control" id="due" type="date"><button>&#52628;&#44032;</button></form><div class="toolbar"><div class="filters"><button type="button" class="active" data-filter="all">&#51204;&#52404;</button><button type="button" data-filter="active">&#51652;&#54665; &#51473;</button><button type="button" data-filter="done">&#50756;&#47308;</button></div><button class="clear" id="clear" type="button">&#50756;&#47308; &#54637;&#47785; &#48708;&#50864;&#44592;</button></div><ul id="list"></ul><p id="empty" class="empty" hidden>&#51060; &#47785;&#47197;&#51008; &#48708;&#50612; &#51080;&#49845;&#45768;&#45796;.</p></section></div></main><dialog id="editor"><form method="dialog" id="editForm"><h2>&#51068;&#51221; &#49688;&#51221;</h2><div class="edit-grid"><label>&#54624; &#51068;<input id="editTitle" class="control" required></label><label>&#50864;&#49440;&#49692;&#50948;<select id="editPriority" class="control"><option>&#45458;&#51020;</option><option>&#48372;&#53685;</option><option>&#45230;&#51020;</option></select></label><label>&#47560;&#44048;&#51068;<input id="editDue" class="control" type="date"></label></div><div class="dialog-actions"><button value="cancel">&#52712;&#49548;</button><button class="save" value="default">&#51200;&#51109;</button></div></form></dialog><script>
const $=s=>document.querySelector(s),key='focus-list-2',pr={'\ub192\uc74c':0,'\ubcf4\ud1b5':1,'\ub0ae\uc74c':2};let list=JSON.parse(localStorage.getItem(key)||'null')||[{id:1,title:'\uc624\ub298 \uac00\uc7a5 \uc911\uc694\ud55c \uc77c \uc815\ud558\uae30',priority:'\ub192\uc74c',due:'',done:false},{id:2,title:'\uc791\uc740 \uc77c \ud558\ub098 \ubc14\ub85c \ub05d\ub0b4\uae30',priority:'\ubcf4\ud1b5',due:'',done:false}],filter='all',editing=null;const ko=new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});$('#today').textContent=ko.format(new Date());function save(){localStorage.setItem(key,JSON.stringify(list))}function esc(v){return v.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function due(v){if(!v)return '';let d=new Date(v+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);let t=d.getTime()-n.getTime(),label=t===0?'\uc624\ub298':t===86400000?'\ub0b4\uc77c':t<0?'\uae30\ud55c \uc9c0\ub0a8':v.replaceAll('-','.');return `<span>${label}</span>`}function render(){let v=list.filter(t=>filter==='all'||filter==='done'?filter==='all'||t.done:!t.done),d=list.filter(t=>t.done).length,n=list.length;$('#remaining').textContent=n-d;$('#done').textContent=d;$('#total').textContent=n;let pct=n?Math.round(d/n*100):0;$('#ratio').textContent=pct+'%';$('#ring').style.setProperty('--progress',pct+'%');$('#empty').hidden=v.length>0;$('#list').innerHTML=v.map(t=>`<li class="task ${t.done?'done':''}"><input class="check" type="checkbox" data-check="${t.id}" ${t.done?'checked':''} aria-label="${esc(t.title)} \uc644\ub8cc"><div><div class="task-title">${esc(t.title)}</div><div class="meta"><span class="badge ${t.priority==='\ub192\uc74c'?'high':''}">${t.priority}</span>${due(t.due)}</div></div><div class="actions"><button class="icon" data-edit="${t.id}" aria-label="\uc218\uc815">&#9998;</button><button class="icon" data-delete="${t.id}" aria-label="\uc0ad\uc81c">&#10005;</button></div></li>`).join('');save()}$('#form').onsubmit=e=>{e.preventDefault();let t=$('#title');list.unshift({id:Date.now(),title:t.value.trim(),priority:$('#priority').value,due:$('#due').value,done:false});t.value='';$('#due').value='';render();t.focus()};$('#list').onchange=e=>{let t=list.find(x=>x.id===+e.target.dataset.check);if(t){t.done=e.target.checked;render()}};$('#list').onclick=e=>{let id=+(e.target.dataset.delete||e.target.dataset.edit);if(!id)return;if(e.target.dataset.delete){list=list.filter(t=>t.id!==id);render()}else{editing=list.find(t=>t.id===id);$('#editTitle').value=editing.title;$('#editPriority').value=editing.priority;$('#editDue').value=editing.due;$('#editor').showModal()}};$('#editForm').onsubmit=e=>{e.preventDefault();editing.title=$('#editTitle').value.trim();editing.priority=$('#editPriority').value;editing.due=$('#editDue').value;$('#editor').close();render()};document.querySelector('.filters').onclick=e=>{if(!e.target.dataset.filter)return;filter=e.target.dataset.filter;document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b===e.target));render()};$('#clear').onclick=()=>{list=list.filter(t=>!t.done);render()};function theme(dark){document.documentElement.dataset.theme=dark?'dark':'';localStorage.setItem('focus-theme',dark?'dark':'light');$('#themeIcon').innerHTML=dark?'&#9728;':'&#9788;';$('#themeText').innerHTML=dark?'&#51068;&#48152; &#47784;&#46300;':'&#45796;&#53356; &#47784;&#46300;'}$('#theme').onclick=()=>theme(document.documentElement.dataset.theme!=='dark');theme(localStorage.getItem('focus-theme')==='dark');render();
</script></body></html>
