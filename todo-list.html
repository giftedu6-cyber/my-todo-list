<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Focus List</title><style>
:root{--bg:#f6f7fb;--surface:#fff;--surface2:#f7f8fc;--ink:#172033;--muted:#6b7280;--line:#e5e8f0;--brand:#635bff;--soft:#eeedff;--danger:#d9485f;--shadow:0 18px 55px #26345a14}[data-theme="dark"]{--bg:#10131a;--surface:#191e29;--surface2:#222937;--ink:#f0f3ff;--muted:#aab3c5;--line:#30394a;--brand:#978fff;--soft:#2d2c52;--danger:#ff8594;--shadow:0 18px 55px #0006}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}.app{max-width:930px;margin:auto;padding:36px 18px 70px}.top{display:flex;align-items:center;justify-content:space-between;gap:15px}.eyebrow{font-size:.76rem;letter-spacing:.13em;font-weight:700;color:var(--brand)}h1{margin:4px 0 6px;font-size:2.15rem;letter-spacing:-.05em}.sub{margin:0;color:var(--muted)}button,input,select{font:inherit}.theme,.logout{background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:9px 11px;cursor:pointer}.layout{display:grid;grid-template-columns:255px 1fr;gap:20px;margin-top:27px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.side{padding:19px}.side h2{font-size:.94rem;margin:0 0 13px}.metrics{display:grid;gap:10px}.metric{padding:13px;background:var(--surface2);border-radius:12px}.metric b{display:block;font-size:1.55rem}.metric span{font-size:.8rem;color:var(--muted)}.ring{--p:0%;width:120px;height:120px;border-radius:50%;display:grid;place-items:center;margin:20px auto 4px;background:conic-gradient(var(--brand) var(--p),var(--line) 0)}.ring:before{content:"";width:94px;height:94px;border-radius:50%;background:var(--surface);grid-area:1/1}.ring b{grid-area:1/1;z-index:1}.account{margin-top:18px;padding-top:15px;border-top:1px solid var(--line);color:var(--muted);font-size:.82rem;overflow-wrap:anywhere}.logout{margin-top:10px;width:100%}.main{padding:19px}.add{display:grid;grid-template-columns:1fr 115px 145px auto;gap:8px}.control{height:43px;padding:0 11px;borde </style></head><body><section id="authView" class="panel auth"><div class="eyebrow">CLOUD SYNC ENABLED</div><h1 id="authTitle">Focus List</h1><p class="sub" id="authText">&#47196;&#44536;&#51064;&#54616;&#47732; &#54624; &#51068;&#51060; &#44228;&#51221;&#50640; &#50504;&#51204;&#54616;&#44172; &#51200;&#51109;&#46121;&#45768;&#45796;.</p><form id="authForm"><input class="control" id="email" type="email" placeholder="&#51060;&#47700;&#51068;" required><input class="control" id="password" type="password" placeholder="&#48708;&#48128;&#48264;&#54840; (6&#51088; &#51060;&#49345;)" minlength="6" required><button class="primary" id="authButton">&#47196;&#44536;&#51064;</button><p class="error" id="authError"></p><button class="switch" type="button" id="authSwitch">&#44228;&#51221;&#51060; &#50630;&#45208;&#50836;? &#54924;&#50896;&#44032;&#51077;</button></form></section><main id="appView" class="app" hidden><header class="top"><div><div class="eyebrow">PERSONAL CLOUD WORKSPACE</div><h1>Focus List</h1><p class="sub" id="today"></p></div><button class="theme" id="theme">&#9790; <span id="themeText">&#45796;&#53356; &#47784;&#46300;</span></button></header><div class="layout"><aside class="panel side"><h2>&#50724;&#45720;&#51032; &#54788;&#54889;</h2><div class="metrics"><div class="metric"><b id="remaining">0</b><span>&#45224;&#51008; &#51068;</span></div><div class="metric"><b id="done">0</b><span>&#50756;&#47308;&#54620; &#51068;</span></div><div class="metric"><b id="total">0</b><span>&#51204;&#52404; &#54637;&#47785;</span></div></div><div class="ring" id="ring"><b id="ratio">0%</b></div><div class="account"><span id="userEmail"></span><button class="logout" id="logout">&#47196;&#44536;&#50500;&#50883;</button></div></aside><section class="panel main"><form id="todoForm" class="add"><input class="control" id="todoTitle" placeholder="&#49352; &#54624; &#51068;&#51012; &#51077;&#47141;&#54616;&#49464;&#50836;" maxlength="100" required><select class="control" id="priority"><option>&#48372;&#53685;</option><option>&#45458;&#51020;</option><option>&#45230;&#51020;</option></select><input class="control" id="due" type="date"><button class="primary">&#52628;&#44032;</button></form><div class="toolbar"><div class="filters"><button class="active" type="button" data-filter="all">&#51204;&#52404;</button><button type="button" data-filter="active">&#51652;&#54665; &#51473;</button><button type="button" data-filter="done">&#50756;&#47308;</button></div><button class="clear" id="clear" type="button">&#50756;&#47308; &#54637;&#47785; &#48708;&#50864;&#44592;</button></div><ul id="list"></ul><p id="empty" class="empty" hidden>&#51060; &#47785;&#47197;&#51008; &#48708;&#50612; &#51080;&#49845;&#45768;&#45796;.</p></section></div></main><dialog id="editor"><form method="dialog" id="editForm"><h2>&#51068;&#51221; &#49688;&#51221;</h2><p><input class="control" id="editTitle" required></p><p><select class="control" id="editPriority"><option>&#45458;&#51020;</option><option>&#48372;&#53685;</option><option>&#45230;&#51020;</option></select></p><p><input class="control" id="editDue" type="date"></p><p><button value="cancel">&#52712;&#49548;</button> <button class="primary" value="default">&#51200;&#51109;</button></p></form></dialog><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';import{getAuth,onAuthStateChanged,signInAnonymously,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';import{getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,deleteDoc,query,orderBy,writeBatch}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';

function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function due(v){if(!v)return '';let d=new Date(v+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);let t=d-n;return `<span>${t===0?'&#50724;&#45720;':t===86400000?'&#45236;&#51068;':t<0?'&#44592;&#54620; &#51648;&#45240;':v.replaceAll('-','.')}</span>`}function render(){let ordered=[...todos].sort((a,b)=>{let ad=a.due||'9999-12-31',bd=b.due||'9999-12-31';return ad.localeCompare(bd)||(b.createdAt||0)-(a.createdAt||0)}),v=ordered.filter(t=>filter==='all'||filter==='done'?filter==='all'||t.done:!t.done),d=todos.filter(t=>t.done).length,n=todos.length,p=n?Math.round(d/n*100):0;$('#remaining').textContent=n-d;$('#done').textContent=d;$('#total').textContent=n;$('#ratio').textContent=p+'%';$('#ring').style.setProperty('--p',p+'%');$('#empty').hidden=v.length>0;$('#list').innerHTML=v.map(t=>`<li class="task ${t.done?'done':''}"><input class="check" type="checkbox" data-check="${t.id}" ${t.done?'checked':''}><div><div class="title">${esc(t.title)}</div><div class="meta"><span class="badge ${t.priority==='\ub192\uc74c'?'high':''}">${t.priority}</span>${due(t.due)}</div></div><div class="actions"><button class="icon" data-edit="${t.id}">&#9998;</button><button class="icon" data-delete="${t.id}">&#10005;</button></div></li>`).join('')}
function todosRef(){return collection(db,'users',user.uid,'todos')}function watch(){if(unsub)unsub();unsub=onSnapshot(query(todosRef(),orderBy('createdAt','desc')),s=>{todos=s.docs.map(d=>({id:d.id,...d.data()}));render()},e=>{$('#authError').textContent='&#45936;&#51060;&#53552; &#50672;&#44208; &#50724;&#47448;: '+e.code})}function showApp(u){user=u;$('#authView').hidden=true;$('#appView').hidden=false;$('#userEmail').textContent=u.email;watch()}function showAuth(){if(unsub)unsub();unsub=null;$('#appView').hidden=true;$('#authView').hidden=false}
onAuthStateChanged(auth,u=>u?showApp(u):showAuth());$('#authSwitch').onclick=()=>{isSignup=!isSignup;$('#authTitle').textContent=isSignup?'&#49352; &#44228;&#51221; &#47564;&#46308;&#44592':'Focus List';$('#authButton').textContent=isSignup?'&#54924;&#50896;&#44032;&#51077;':'&#47196;&#44536;&#51064;';$('#authSwitch').innerHTML=isSignup?'&#51060;&#48120; &#44228;&#51221;&#51060; &#51080;&#45208;&#50836;? &#47196;&#44536;&#51064;':'&#44228;&#51221;&#51060; &#50630;&#45208;&#50836;? &#54924;&#50896;&#44032;&#51077;';$('#authError').textContent=''};$('#authForm').onsubmit=async e=>{e.preventDefault();try{let em=$('#email').value,pw=$('#password').value;if(isSignup)await createUserWithEmailAndPassword(auth,em,pw);else await signInWithEmailAndPassword(auth,em,pw)}catch(e){$('#authError').textContent=e.code==='auth/email-already-in-use'?'&#51060;&#48120; &#49324;&#50857; &#51473;&#51064; &#51060;&#47700;&#51068;&#51077;&#45768;&#45796;.':e.code==='auth/invalid-credential'?'&#51060;&#47700;&#51068; &#46608;&#45716; &#48708;&#48128;&#48264;&#54840;&#44032; &#47611;&#51648; &#50506;&#49845;&#45768;&#45796;.':e.message}};$('#logout').onclick=()=>signOut(auth);
$('#todoForm').onsubmit=async e=>{e.preventDefault();let title=$('#todoTitle');await addDoc(todosRef(),{title:title.value.trim(),priority:$('#priority').value,due:$('#due').value,done:false,createdAt:Date.now()});title.value='';$('#due').value='';title.focus()};$('#list').onchange=e=>{let id=e.target.dataset.check;if(id)updateDoc(doc(todosRef(),id),{done:e.target.checked})};$('#list').onclick=async e=>{let id=e.target.dataset.delete||e.target.dataset.edit;if(!id)return;if(e.target.dataset.delete)await deleteDoc(doc(todosRef(),id));else{editing=todos.find(t=>t.id===id);$('#editTitle').value=editing.title;$('#editPriority').value=editing.priority;$('#editDue').value=editing.due||'';$('#editor').showModal()}};$('#editForm').onsubmit=async e=>{e.preventDefault();await updateDoc(doc(todosRef(),editing.id),{title:$('#editTitle').value.trim(),priority:$('#editPriority').value,due:$('#editDue').value});$('#editor').close()};document.querySelector('.filters').onclick=e=>{if(!e.target.dataset.filter)return;filter=e.target.dataset.filter;document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b===e.target));render()};$('#clear').onclick=async()=>{let batch=writeBatch(db);todos.filter(t=>t.done).forEach(t=>batch.delete(doc(todosRef(),t.id)));await batch.commit()};function theme(dark){document.documentElement.dataset.theme=dark?'dark':'';localStorage.setItem('focus-theme',dark?'dark':'light');$('#themeText').innerHTML=dark?'&#51068;&#48152; &#47784;&#46300;':'&#45796;&#53356; &#47784;&#46300;'}$('#theme').onclick=()=>theme(document.documentElement.dataset.theme!=='dark');theme(localStorage.getItem('focus-theme')==='dark');
const guestButton=document.createElement('button');guestButton.type='button';guestButton.className='switch';guestButton.textContent='\uac8c\uc2a4\ud2b8\ub85c \uc2dc\uc791';$('#authForm').append(guestButton);guestButton.onclick=()=>signInAnonymously(auth).catch(e=>{$('#authError').textContent='\uac8c\uc2a4\ud2b8 \uc2dc\uc791 \uc624\ub958: '+e.code});
</script></body></html>
